<!DOCTYPE html>
<html>
<head>
    <title>My Certificates</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        h1 {
            text-align: center;
            padding: 30px 10px;
            font-size: 2.5rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            transition: 0.4s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card h3 {
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

    </style>
</head>

<body>

<h1>My Certificates Portfolio</h1>

<div class="container">

    <div class="card" onclick="openImage('Certificates/java_certification.jpg')">
        <img src="Certificates/java_certification.jpg">
        <h3>Java Certificate</h3>
    </div>

    <div class="card" onclick="openImage('Certificates/python_course.jpg')">
        <img src="Certificates/python_course.jpg">
        <h3>Python Certificate</h3>
    </div>

    <div class="card" onclick="openImage('Certificates/web_development_course.jpg')">
        <img src="Certificates/web_development_course.jpg">
        <h3>Web Development</h3>
    </div>

    <div class="card" onclick="openImage('Certificates/sql_certification.jpg')">
        <img src="Certificates/sql_certification.jpg">
        <h3>SQL Certificate</h3>
    </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeImage()">
    <img id="lightbox-img">
</div>

<script>
    function openImage(src) {
        document.getElementById("lightbox").style.display = "flex";
        document.getElementById("lightbox-img").src = src;
    }

    function closeImage() {
        document.getElementById("lightbox").style.display = "none";
    }
</script>

</body>
</html>
